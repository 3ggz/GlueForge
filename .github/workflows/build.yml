name: Build

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # for publishing releases on tags

defaults:
  run:
    shell: pwsh

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Clone JUCE + Catch2
        run: |
          git clone --depth 1 --branch 8.0.4 https://github.com/juce-framework/JUCE.git libs/JUCE
          git clone --depth 1 --branch v3.5.2 https://github.com/catchorg/Catch2.git libs/Catch2

      # Set up the MSVC x64 toolchain without a third-party action (none ship a
      # Node 24 runtime yet). Source vcvars64 and persist its env to GITHUB_ENV
      # so the Configure/Build/Test steps see cl.exe — same approach as build.ps1.
      - name: Set up MSVC
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) { throw "Visual Studio with VC tools not found" }
          $vcvars = Join-Path $vsPath 'VC\Auxiliary\Build\vcvars64.bat'
          cmd /c "`"$vcvars`" && set" | ForEach-Object {
            if ($_ -match '^([^=]+)=(.*)$') {
              "$($matches[1])=$($matches[2])" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            }
          }

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Upload VST3 + Standalone
        uses: actions/upload-artifact@v7
        with:
          name: GlueForge-Windows
          path: |
            build/GlueForge_artefacts/Release/VST3/GlueForge.vst3/**
            build/GlueForge_artefacts/Release/Standalone/GlueForge.exe

      - name: Build installer (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          $stage = "dist/GlueForge-$ver"
          New-Item -ItemType Directory -Force "$stage/VST3" | Out-Null
          New-Item -ItemType Directory -Force "$stage/Standalone" | Out-Null
          Copy-Item "build/GlueForge_artefacts/Release/VST3/GlueForge.vst3" "$stage/VST3" -Recurse -Force
          Copy-Item "build/GlueForge_artefacts/Release/Standalone/GlueForge.exe" "$stage/Standalone" -Force
          choco install innosetup -y --no-progress
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "installer/GlueForge.iss" "/DMyVersion=$ver"

      - name: Publish release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/GlueForge-Setup-*.exe
          generate_release_notes: true
